<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeForge — 100+ Professional Templates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:wght@400;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: #2a2a38;
  --accent: #6366f1;
  --accent2: #a78bfa;
  --text: #f0f0f5;
  --muted: #6b6b85;
  --success: #22c55e;
  --danger: #ef4444;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
.site-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.6rem;
  letter-spacing: 3px;
  color: var(--accent2);
}
.logo span { color: var(--muted); font-size: 0.75rem; letter-spacing: 2px; font-family: 'DM Sans', sans-serif; font-weight: 300; margin-left: 8px; }

.header-actions { display: flex; gap: 10px; align-items: center; }

.btn {
  padding: 8px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
}
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.btn-ghost:hover { border-color: var(--accent); color: var(--text); }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #4f46e5; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99,102,241,0.3); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #16a34a; transform: translateY(-1px); }

/* LAYOUT */
.app-layout {
  display: grid;
  grid-template-columns: 340px 1fr 360px;
  height: calc(100vh - 60px);
  overflow: hidden;
}

/* LEFT PANEL - FORM */
.form-panel {
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  height: 100%;
}

.form-panel::-webkit-scrollbar { width: 4px; }
.form-panel::-webkit-scrollbar-track { background: transparent; }
.form-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.form-panel-header {
  padding: 1.25rem 1.5rem 1rem;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 10;
}
.form-panel-header h2 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.form-panel-header p { font-size: 11px; color: var(--muted); }

.form-body { padding: 1.25rem 1.5rem 4rem; }

.section-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 1.5rem 0 0.75rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.field { margin-bottom: 0.6rem; }
.field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.field input, .field textarea, .field select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  transition: border-color 0.2s;
  outline: none;
}
.field input:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 64px; line-height: 1.5; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.add-btn {
  width: 100%;
  padding: 7px;
  border: 1px dashed var(--border);
  border-radius: 8px;
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
  margin-top: 6px;
}
.add-btn:hover { border-color: var(--accent); color: var(--accent); }

.entry-card {
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.875rem;
  margin-bottom: 8px;
  background: var(--surface2);
  position: relative;
}
.entry-card .rm { position: absolute; top: 8px; right: 8px; width: 22px; height: 22px; border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 14px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
.entry-card .rm:hover { background: rgba(239,68,68,0.1); color: var(--danger); }

.tag-wrap { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.tag { background: rgba(99,102,241,0.12); color: var(--accent2); border: 1px solid rgba(99,102,241,0.2); padding: 2px 8px 2px 10px; border-radius: 20px; font-size: 11px; display: flex; align-items: center; gap: 4px; }
.tag button { background: none; border: none; cursor: pointer; color: inherit; font-size: 13px; line-height: 1; padding: 0; }

.skill-row { display: flex; gap: 6px; }
.skill-row input { flex: 1; }
.skill-row button { padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap; transition: all 0.2s; }
.skill-row button:hover { border-color: var(--accent); color: var(--accent); }

/* CENTER - PRESETS */
.presets-panel {
  background: var(--bg);
  overflow-y: auto;
  height: 100%;
  padding: 1.5rem;
}
.presets-panel::-webkit-scrollbar { width: 4px; }
.presets-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.presets-header { margin-bottom: 1.25rem; }
.presets-header h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.presets-header p { font-size: 12px; color: var(--muted); }

.category-tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 1.25rem;
}
.cat-tab {
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
  white-space: nowrap;
}
.cat-tab:hover { border-color: var(--accent); color: var(--text); }
.cat-tab.active { background: var(--accent); border-color: var(--accent); color: white; }

.presets-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.preset-thumb {
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--surface);
  position: relative;
}
.preset-thumb:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.preset-thumb.active { border-color: var(--accent2); border-width: 2px; box-shadow: 0 0 0 3px rgba(167,139,250,0.15); }

.thumb-preview {
  height: 90px;
  position: relative;
  overflow: hidden;
}
.thumb-footer { padding: 8px 10px; }
.thumb-name { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.thumb-cat { font-size: 9px; color: var(--muted); margin-top: 1px; }

/* RIGHT PANEL - PREVIEW */
.preview-panel {
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100%;
}

.preview-header {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.preview-header h3 { font-size: 13px; font-weight: 500; }

.preview-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.preview-wrap::-webkit-scrollbar { width: 4px; }
.preview-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

#resumeCanvas {
  width: 100%;
  border-radius: 6px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  display: block;
}

.preview-footer {
  padding: 1rem 1.25rem;
  border-top: 1px solid var(--border);
}

.dl-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  letter-spacing: 0.5px;
}
.dl-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(99,102,241,0.4); }

.count-badge {
  background: rgba(99,102,241,0.15);
  color: var(--accent2);
  border: 1px solid rgba(99,102,241,0.2);
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
}
</style>
</head>

  </div>
</header>

<div class="app-layout">

  <!-- FORM PANEL -->
  <div class="form-panel">
    <div class="form-panel-header">
      <h2>Your Information</h2>
      <p>Fill in details — preview updates live</p>
    </div>
    <div class="form-body">

      <div class="section-label">Personal</div>
      <div class="field"><label>Full Name</label><input id="f_name" placeholder="Alex Johnson" oninput="render()"></div>
      <div class="field"><label>Job Title</label><input id="f_title" placeholder="Senior Product Designer" oninput="render()"></div>
      <div class="row2">
        <div class="field"><label>Email</label><input id="f_email" placeholder="alex@email.com" oninput="render()"></div>
        <div class="field"><label>Phone</label><input id="f_phone" placeholder="+1 555 000 0000" oninput="render()"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Location</label><input id="f_loc" placeholder="London, UK" oninput="render()"></div>
        <div class="field"><label>LinkedIn / Website</label><input id="f_link" placeholder="linkedin.com/in/alex" oninput="render()"></div>
      </div>
      <div class="field"><label>Professional Summary</label><textarea id="f_summary" placeholder="2-3 sentences about your experience and key strengths..." oninput="render()"></textarea></div>

      <div class="section-label">Experience</div>
      <div id="expList"></div>
      <button class="add-btn" onclick="addExp()">+ Add Experience</button>

      <div class="section-label">Education</div>
      <div id="eduList"></div>
      <button class="add-btn" onclick="addEdu()">+ Add Education</button>

      <div class="section-label">Skills</div>
      <div class="skill-row">
        <input id="skillIn" placeholder="e.g. Figma, Python, React..." onkeydown="if(event.key==='Enter'){addSkill();event.preventDefault()}">
        <button onclick="addSkill()">Add</button>
      </div>
      <div class="tag-wrap" id="skillTags"></div>

      <div class="section-label">Certifications</div>
      <div class="skill-row">
        <input id="certIn" placeholder="e.g. AWS Certified, PMP..." onkeydown="if(event.key==='Enter'){addCert();event.preventDefault()}">
        <button onclick="addCert()">Add</button>
      </div>
      <div class="tag-wrap" id="certTags"></div>

      <div class="section-label">Languages</div>
      <div class="skill-row">
        <input id="langIn" placeholder="e.g. English (Native)..." onkeydown="if(event.key==='Enter'){addLang();event.preventDefault()}">
        <button onclick="addLang()">Add</button>
      </div>
      <div class="tag-wrap" id="langTags"></div>

    </div>
  </div>

  <!-- PRESETS PANEL -->
  <div class="presets-panel">
    <div class="presets-header">
      <h2>Choose Your Template</h2>
      <p>All templates are ATS-friendly and interview-proven. Click to apply instantly.</p>
    </div>
    <div class="category-tabs" id="categoryTabs"></div>
    <div class="presets-grid" id="presetsGrid"></div>
  </div>

  <!-- PREVIEW PANEL -->
  <div class="preview-panel">
    <div class="preview-header">
      <h3>Live Preview</h3>
      <span id="presetLabel" style="font-size:11px;color:var(--muted)">Minimal Classic</span>
    </div>
    <div class="preview-wrap">
      <canvas id="resumeCanvas"></canvas>
    </div>
    <div class="preview-footer">
      <button class="dl-btn" onclick="downloadPDF()">⬇ &nbsp;Download PDF</button>
    </div>
  </div>
</div>

// ─── CATEGORY TABS ───────────────────────────────────────────────────────────
function buildCategoryTabs(){
  const wrap = document.getElementById('categoryTabs');
  wrap.innerHTML = CATEGORIES.map(cat => `
    <button class="cat-tab${cat===currentCat?' active':''}" onclick="selectCat('${cat}')">${cat}</button>
  `).join('');
}

function selectCat(cat){
  currentCat = cat;
  buildCategoryTabs();
  buildPresetsGrid();
}

// ─── PRESETS GRID ────────────────────────────────────────────────────────────
function buildPresetsGrid(){
  const filtered = currentCat === "All" ? PRESETS : PRESETS.filter(p => p.cat === currentCat);
  const grid = document.getElementById('presetsGrid');
  grid.innerHTML = filtered.map(p => `
    <div class="preset-thumb${p.id===selectedPreset?' active':''}" onclick="selectPreset(${p.id})">
      <div class="thumb-preview" style="background:${p.bg}">
        ${buildMiniPreview(p)}
      </div>
      <div class="thumb-footer">
        <div class="thumb-name">${p.name}</div>
        <div class="thumb-cat">${p.cat}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('totalCount').textContent = `${PRESETS.length} templates`;
}

function buildMiniPreview(p){
  const isDark = isColorDark(p.bg);
  const textAlpha = isDark ? '0.7' : '0.4';
  return `
    <div style="position:absolute;left:0;right:0;top:0;height:28px;background:${p.accent}"></div>
    <div style="position:absolute;top:8px;left:8px;right:8px;height:12px;background:rgba(255,255,255,0.9);border-radius:2px"></div>
    <div style="position:absolute;top:34px;left:8px;width:55%;height:2px;background:${p.text};opacity:${textAlpha};border-radius:1px"></div>
    <div style="position:absolute;top:40px;left:8px;width:75%;height:1.5px;background:${p.text};opacity:0.2;border-radius:1px"></div>
    <div style="position:absolute;top:46px;left:8px;width:60%;height:1.5px;background:${p.text};opacity:0.15;border-radius:1px"></div>
    <div style="position:absolute;top:56px;left:8px;width:40%;height:1.5px;background:${p.accent};opacity:0.6;border-radius:1px"></div>
    <div style="position:absolute;top:62px;left:8px;width:70%;height:1.5px;background:${p.text};opacity:0.15;border-radius:1px"></div>
    <div style="position:absolute;top:68px;left:8px;width:50%;height:1.5px;background:${p.text};opacity:0.12;border-radius:1px"></div>
  `;
}

function isColorDark(hex){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000 < 128;
}

function selectPreset(id){
  selectedPreset = id;
  buildPresetsGrid();
  render();
  document.getElementById('presetLabel').textContent = PRESETS.find(p=>p.id===id)?.name || '';
}

      <button class="rm" onclick="removeExp(${i})">×</button>

      <div class="field"><label>Description</label><textarea oninput="expItems[${i}].desc=this.value;render()" placeholder="Key achievements...">${esc(e.desc)}</textarea></div>
    </div>`).join('');
}

      <div class="row2">
        <div class="field"><label>School</label><input value="${esc(e.school)}" oninput="eduItems[${i}].school=this.value;render()" placeholder="MIT"></div>
        <div class="field"><label>Dates</label><input value="${esc(e.dates)}" oninput="eduItems[${i}].dates=this.value;render()" placeholder="2018 – 2022"></div>
      </div>
    </div>`).join('');
}

function addSkill(){ const v=document.getElementById('skillIn').value.trim(); if(!v)return; skills.push(v); document.getElementById('skillIn').value=''; renderTags(); render(); }
function addCert(){ const v=document.getElementById('certIn').value.trim(); if(!v)return; certs.push(v); document.getElementById('certIn').value=''; renderTags(); render(); }
function addLang(){ const v=document.getElementById('langIn').value.trim(); if(!v)return; langs.push(v); document.getElementById('langIn').value=''; renderTags(); render(); }
function removeSkill(i){ skills.splice(i,1); renderTags(); render(); }
function removeCert(i){ certs.splice(i,1); renderTags(); render(); }
function removeLang(i){ langs.splice(i,1); renderTags(); render(); }

function renderTags(){
  document.getElementById('skillTags').innerHTML = skills.map((s,i)=>`<span class="tag">${s}<button onclick="removeSkill(${i})">×</button></span>`).join('');
  document.getElementById('certTags').innerHTML = certs.map((c,i)=>`<span class="tag">${c}<button onclick="removeCert(${i})">×</button></span>`).join('');
  document.getElementById('langTags').innerHTML = langs.map((l,i)=>`<span class="tag">${l}<button onclick="removeLang(${i})">×</button></span>`).join('');
}

function clearForm(){
  ['f_name','f_title','f_email','f_phone','f_loc','f_link','f_summary'].forEach(id=>document.getElementById(id).value='');
  expItems=[]; eduItems=[]; skills=[]; certs=[]; langs=[];
  renderExpList(); renderEduList(); renderTags(); render();
}

function esc(s){ return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── CANVAS RENDERER ──────────────────────────────────────────────────────────
const W=794, H=1123;

function render(){
  const canvas = document.getElementById('resumeCanvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const p = PRESETS.find(pr=>pr.id===selectedPreset) || PRESETS[1];
  const d = getData();
  ctx.clearRect(0,0,W,H);

  if(p.layout==='sidebar') drawSidebar(ctx,p,d);
  else if(p.layout==='minimal') drawMinimal(ctx,p,d);
  else drawClassic(ctx,p,d);
}

function getFont(p, size, weight='normal'){
  const fam = p.font==='serif' ? 'Georgia,serif' : p.font==='mono' ? '"Courier New",monospace' : '"Segoe UI",system-ui,sans-serif';
  return `${weight} ${size}px ${fam}`;
}

function setF(ctx,p,size,weight='normal'){ ctx.font=getFont(p,size,weight); }

function wrapText(ctx,text,x,y,maxW,lineH){
  if(!text)return y;
  const words=text.split(' '); let line='';
  for(let i=0;i<words.length;i++){
    const test=line+words[i]+' ';
    if(ctx.measureText(test).width>maxW&&i>0){ ctx.fillText(line.trim(),x,y); y+=lineH; line=words[i]+' '; }
    else line=test;
  }
  if(line.trim()) ctx.fillText(line.trim(),x,y);
  return y+lineH;
}

function sectionHead(ctx,p,label,x,y,w){
  setF(ctx,p,9,'bold'); ctx.fillStyle=p.accent;
  ctx.fillText(label.toUpperCase(),x,y); y+=5;
  ctx.fillStyle=p.accent; ctx.fillRect(x,y,w,1.5); y+=10;
  return y;
}

function drawClassic(ctx,p,d){
  ctx.fillStyle=p.bg; ctx.fillRect(0,0,W,H);
  // Header band
  ctx.fillStyle=p.accent; ctx.fillRect(0,0,W,130);
  // Stripe
  ctx.fillStyle=p.stripe||p.accent; ctx.fillRect(0,128,W,4);
  // Name
  setF(ctx,p,30,'bold'); ctx.fillStyle='#FFFFFF';
  const isDarkBg = isColorDark(p.accent);
  ctx.fillStyle = isDarkBg ? '#FFFFFF' : '#FFFFFF';
  ctx.fillText(d.name,44,56);
  // Title
  setF(ctx,p,14); ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.fillText(d.title,44,78);
  // Contact
  setF(ctx,p,10); ctx.fillStyle='rgba(255,255,255,0.7)';
  const contact=`${d.email}   •   ${d.phone}   •   ${d.loc}   •   ${d.link}`;
  ctx.fillText(contact,44,102);

  let y=156;
  const PAD=44, RW=W-88;

  if(d.summary){
    y = sectionHead(ctx,p,'Summary',PAD,y,RW);
    ctx.fillStyle=p.text; setF(ctx,p,11.5);
    y = wrapText(ctx,d.summary,PAD,y,RW,17)+14;
  }

  if(d.exp.length){
    y = sectionHead(ctx,p,'Experience',PAD,y,RW);
    d.exp.forEach(e=>{
      if(y>H-60) return;
      setF(ctx,p,13,'bold'); ctx.fillStyle=p.text; ctx.fillText(e.role||'Role',PAD,y);
      setF(ctx,p,10); ctx.fillStyle=p.sub; const dw=ctx.measureText(e.dates||'').width; ctx.fillText(e.dates||'',W-PAD-dw,y); y+=15;
      setF(ctx,p,11,'bold'); ctx.fillStyle=p.accent; ctx.fillText(e.company||'Company',PAD,y); y+=15;
      ctx.fillStyle=p.text; setF(ctx,p,11);
      y = wrapText(ctx,e.desc||'',PAD,y,RW,15)+10;
    });
  }

  if(d.edu.length){
    y = sectionHead(ctx,p,'Education',PAD,y,RW);
    d.edu.forEach(e=>{
      if(y>H-40) return;
      setF(ctx,p,13,'bold'); ctx.fillStyle=p.text; ctx.fillText(e.degree||'',PAD,y);
      setF(ctx,p,10); ctx.fillStyle=p.sub; const dw=ctx.measureText(e.dates||'').width; ctx.fillText(e.dates||'',W-PAD-dw,y); y+=15;
      setF(ctx,p,11); ctx.fillStyle=p.accent; ctx.fillText(e.school||'',PAD,y); y+=22;
    });
  }

  if(d.skills.length || d.certs.length || d.langs.length){
    y = sectionHead(ctx,p,'Skills & Languages',PAD,y,RW);
    if(d.skills.length){
      ctx.fillStyle=p.text; setF(ctx,p,11);
      y = wrapText(ctx,d.skills.join('  ·  '),PAD,y,RW,16)+4;
    }
    if(d.certs.length){
      ctx.fillStyle=p.sub; setF(ctx,p,10);
      y = wrapText(ctx,d.certs.join('  ·  '),PAD,y,RW,15)+4;
    }
    if(d.langs.length){
      ctx.fillStyle=p.sub; setF(ctx,p,10);
      y = wrapText(ctx,d.langs.join('  ·  '),PAD,y,RW,15);
    }
  }
}

function drawMinimal(ctx,p,d){
  ctx.fillStyle=p.bg; ctx.fillRect(0,0,W,H);
  const PAD=48;
  // Left accent bar
  ctx.fillStyle=p.accent; ctx.fillRect(PAD,42,3,70);
  // Name
  setF(ctx,p,32,'bold'); ctx.fillStyle=p.text; ctx.fillText(d.name,PAD+14,72);
  setF(ctx,p,14); ctx.fillStyle=p.sub; ctx.fillText(d.title,PAD+14,92);
  setF(ctx,p,10); ctx.fillStyle=p.sub;
  ctx.fillText(`${d.email}  |  ${d.phone}  |  ${d.loc}  |  ${d.link}`,PAD+14,110);
  // Divider
  ctx.fillStyle=p.accent; ctx.fillRect(PAD,122,W-PAD*2,1.5);

  let y=146;
  const RW=W-PAD*2;

  if(d.summary){
    setF(ctx,p,9,'bold'); ctx.fillStyle=p.sub; ctx.fillText('ABOUT',PAD,y); y+=13;
    setF(ctx,p,11.5); ctx.fillStyle=p.text;
    y = wrapText(ctx,d.summary,PAD,y,RW,17)+18;
  }

  if(d.exp.length){
    setF(ctx,p,9,'bold'); ctx.fillStyle=p.sub; ctx.fillText('EXPERIENCE',PAD,y); y+=4;
    ctx.fillStyle=p.bar; ctx.fillRect(PAD,y,RW,0.5); y+=12;
    d.exp.forEach(e=>{
      if(y>H-60) return;
      // dot
      ctx.fillStyle=p.accent; ctx.beginPath(); ctx.arc(PAD+4,y-4,3.5,0,Math.PI*2); ctx.fill();
      setF(ctx,p,13,'bold'); ctx.fillStyle=p.text; ctx.fillText(e.role||'',PAD+16,y);
      setF(ctx,p,10); ctx.fillStyle=p.sub; const dw=ctx.measureText(e.dates||'').width; ctx.fillText(e.dates||'',W-PAD-dw,y); y+=15;
      setF(ctx,p,11); ctx.fillStyle=p.sub; ctx.fillText(e.company||'',PAD+16,y); y+=14;
      ctx.fillStyle=p.text; setF(ctx,p,11);
      y = wrapText(ctx,e.desc||'',PAD+16,y,RW-16,15)+10;
    });
    y+=4;
  }

  if(d.edu.length){
    setF(ctx,p,9,'bold'); ctx.fillStyle=p.sub; ctx.fillText('EDUCATION',PAD,y); y+=4;
    ctx.fillStyle=p.bar; ctx.fillRect(PAD,y,RW,0.5); y+=12;
    d.edu.forEach(e=>{
      if(y>H-40) return;
      ctx.fillStyle=p.accent; ctx.beginPath(); ctx.arc(PAD+4,y-4,3.5,0,Math.PI*2); ctx.fill();
      setF(ctx,p,13,'bold'); ctx.fillStyle=p.text; ctx.fillText(e.degree||'',PAD+16,y);
      setF(ctx,p,10); ctx.fillStyle=p.sub; const dw=ctx.measureText(e.dates||'').width; ctx.fillText(e.dates||'',W-PAD-dw,y); y+=15;
      setF(ctx,p,11); ctx.fillStyle=p.sub; ctx.fillText(e.school||'',PAD+16,y); y+=20;
    });
    y+=4;
  }

  if(d.skills.length){
    setF(ctx,p,9,'bold'); ctx.fillStyle=p.sub; ctx.fillText('SKILLS',PAD,y); y+=4;
    ctx.fillStyle=p.bar; ctx.fillRect(PAD,y,RW,0.5); y+=12;
    let x=PAD;
    d.skills.forEach(s=>{
      setF(ctx,p,10.5); const tw=ctx.measureText(s).width+14;
      if(x+tw>W-PAD){ x=PAD; y+=20; }
      ctx.fillStyle=p.bar; ctx.beginPath(); ctx.roundRect(x,y-12,tw,17,4); ctx.fill();
      ctx.strokeStyle=p.accent+'44'; ctx.lineWidth=0.5; ctx.beginPath(); ctx.roundRect(x,y-12,tw,17,4); ctx.stroke();
      ctx.fillStyle=p.text; ctx.fillText(s,x+7,y);
      x+=tw+6;
    });
    y+=22;
  }

  if(d.langs.length || d.certs.length){
    if(d.certs.length){
      setF(ctx,p,9,'bold'); ctx.fillStyle=p.sub; ctx.fillText('CERTIFICATIONS',PAD,y); y+=12;
      ctx.fillStyle=p.text; setF(ctx,p,11);
      y = wrapText(ctx,d.certs.join('  ·  '),PAD,y,RW,15)+6;
    }
    if(d.langs.length){
      setF(ctx,p,9,'bold'); ctx.fillStyle=p.sub; ctx.fillText('LANGUAGES',PAD,y); y+=12;
      ctx.fillStyle=p.text; setF(ctx,p,11);
      y = wrapText(ctx,d.langs.join('  ·  '),PAD,y,RW,15);
    }
  }
}

function drawSidebar(ctx,p,d){
  const SW=210, MX=SW+24, MW=W-SW-44;
  ctx.fillStyle=p.bg; ctx.fillRect(0,0,W,H);
  ctx.fillStyle=p.bar; ctx.fillRect(0,0,SW,H);
  // sidebar accent strip
  ctx.fillStyle=p.accent; ctx.fillRect(SW-3,0,3,H);

  // Avatar circle
  ctx.fillStyle=p.accent;
  ctx.beginPath(); ctx.arc(SW/2,72,44,0,Math.PI*2); ctx.fill();
  const initials=(d.name.split(' ').map(n=>n[0]||'').join('').slice(0,2)).toUpperCase();
  setF(ctx,p,22,'bold'); ctx.fillStyle='rgba(255,255,255,0.95)';
  ctx.textAlign='center'; ctx.fillText(initials,SW/2,80); ctx.textAlign='left';

  // Sidebar name
  setF(ctx,p,13,'bold'); ctx.fillStyle=p.text;
  ctx.textAlign='center'; ctx.fillText(d.name,SW/2,130); ctx.textAlign='left';
  setF(ctx,p,10); ctx.fillStyle=p.accent;
  ctx.textAlign='center'; ctx.fillText(d.title,SW/2,146); ctx.textAlign='left';

  let sy=168;
  const sideSection=(label)=>{
    sy+=6;
    setF(ctx,p,8,'bold'); ctx.fillStyle=p.accent; ctx.fillText(label,12,sy); sy+=5;
    ctx.fillStyle=p.accent+'55'; ctx.fillRect(12,sy,SW-24,0.5); sy+=9;
  };

  sideSection('CONTACT');
  const contacts=[[d.email],[d.phone],[d.loc],[d.link]];
  contacts.forEach(([v])=>{
    ctx.fillStyle=p.text; setF(ctx,p,9.5);
    sy=wrapText(ctx,v||'',12,sy,SW-24,13)+3;
  });

  if(d.skills.length){
    sideSection('SKILLS');
    d.skills.forEach(s=>{
      if(sy>H-20) return;
      ctx.fillStyle=p.accent; ctx.fillRect(12,sy-5,2,10);
      ctx.fillStyle=p.text; setF(ctx,p,10); ctx.fillText(s,18,sy); sy+=14;
    });
  }

  if(d.langs.length){
    sideSection('LANGUAGES');
    d.langs.forEach(l=>{
      if(sy>H-20) return;
      ctx.fillStyle=p.text; setF(ctx,p,10); ctx.fillText(l,12,sy); sy+=14;
    });
  }

  if(d.certs.length){
    sideSection('CERTIFICATIONS');
    d.certs.forEach(c=>{
      if(sy>H-20) return;
      ctx.fillStyle=p.text; setF(ctx,p,9.5);
      sy=wrapText(ctx,c,12,sy,SW-24,13)+2;
    });
  }

  // Main content
  let y=42;
  setF(ctx,p,26,'bold'); ctx.fillStyle=p.text; ctx.fillText(d.name,MX,y); y+=20;
  setF(ctx,p,13); ctx.fillStyle=p.accent; ctx.fillText(d.title,MX,y); y+=20;
  ctx.fillStyle=p.accent; ctx.fillRect(MX,y,MW,1.5); y+=14;

  if(d.summary){
    setF(ctx,p,11); ctx.fillStyle=p.text;
    y=wrapText(ctx,d.summary,MX,y,MW,16)+14;
    ctx.fillStyle=p.bar; ctx.fillRect(MX,y,MW,0.5); y+=12;
  }

  if(d.exp.length){
    setF(ctx,p,9,'bold'); ctx.fillStyle=p.accent; ctx.fillText('EXPERIENCE',MX,y); y+=5;
    ctx.fillStyle=p.accent; ctx.fillRect(MX,y,MW,1); y+=12;
    d.exp.forEach(e=>{
      if(y>H-60) return;
      setF(ctx,p,12,'bold'); ctx.fillStyle=p.text; ctx.fillText(e.role||'',MX,y);
      setF(ctx,p,9); ctx.fillStyle=p.sub; const dw=ctx.measureText(e.dates||'').width; ctx.fillText(e.dates||'',W-22-dw,y); y+=14;
      setF(ctx,p,10,'bold'); ctx.fillStyle=p.accent; ctx.fillText(e.company||'',MX,y); y+=13;
      ctx.fillStyle=p.text; setF(ctx,p,10.5);
      y=wrapText(ctx,e.desc||'',MX,y,MW,14)+8;
    });
  }

  if(d.edu.length){
    setF(ctx,p,9,'bold'); ctx.fillStyle=p.accent; ctx.fillText('EDUCATION',MX,y); y+=5;
    ctx.fillStyle=p.accent; ctx.fillRect(MX,y,MW,1); y+=12;
    d.edu.forEach(e=>{
      if(y>H-40) return;
      setF(ctx,p,12,'bold'); ctx.fillStyle=p.text; ctx.fillText(e.degree||'',MX,y);
      setF(ctx,p,9); ctx.fillStyle=p.sub; const dw=ctx.measureText(e.dates||'').width; ctx.fillText(e.dates||'',W-22-dw,y); y+=14;
      setF(ctx,p,10); ctx.fillStyle=p.sub; ctx.fillText(e.school||'',MX,y); y+=20;
    });
  }
}

// ─── PDF DOWNLOAD ─────────────────────────────────────────────────────────────
function downloadPDF(){
  render();
  const canvas=document.getElementById('resumeCanvas');
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:'portrait',unit:'pt',format:'a4'});
  const img=canvas.toDataURL('image/png',1.0);
  pdf.addImage(img,'PNG',0,0,595,842);
  const name=(document.getElementById('f_name').value||'resume').replace(/\s+/g,'_');
  const preset=PRESETS.find(p=>p.id===selectedPreset)?.name.replace(/\s+/g,'_')||'resume';
  pdf.save(`${name}_${preset}.pdf`);
}

buildCategoryTabs();
buildPresetsGrid();
renderExpList();
renderEduList();
renderTags();
render();
